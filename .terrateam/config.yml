# Terrateam configuration - auto-generated by DeployFlow
# Documentation: https://terrateam.io/docs/configuration

dirs:
  ".":
    tags: ["deployflow"]

destination_branches:
  - "main"

workflows:
  - tag_query: "deployflow"
    plan:
      - type: env
        name: ARM_TENANT_ID
        cmd: ['echo', '${ARM_TENANT_ID}']
      - type: env
        name: ARM_SUBSCRIPTION_ID
        cmd: ['echo', '${ARM_SUBSCRIPTION_ID}']
      - type: env
        name: ARM_CLIENT_ID
        cmd: ['echo', '${ARM_CLIENT_ID}']
      - type: env
        name: ARM_CLIENT_SECRET
        cmd: ['echo', '${ARM_CLIENT_SECRET}']
        sensitive: true
      - type: env
        name: TF_VAR_odoo_image_token
        cmd: ['echo', '${TF_VAR_ODOO_IMAGE_TOKEN}']
        sensitive: true
      - type: init
      - type: plan
    apply:
      - type: env
        name: ARM_TENANT_ID
        cmd: ['echo', '${ARM_TENANT_ID}']
      - type: env
        name: ARM_SUBSCRIPTION_ID
        cmd: ['echo', '${ARM_SUBSCRIPTION_ID}']
      - type: env
        name: ARM_CLIENT_ID
        cmd: ['echo', '${ARM_CLIENT_ID}']
      - type: env
        name: ARM_CLIENT_SECRET
        cmd: ['echo', '${ARM_CLIENT_SECRET}']
        sensitive: true
      - type: env
        name: TF_VAR_odoo_image_token
        cmd: ['echo', '${TF_VAR_ODOO_IMAGE_TOKEN}']
        sensitive: true
      - type: init
      - type: apply

when_modified:
  file_patterns:
    - "**/*.tf"
    - "**/*.tfvars"
  autoplan: true
  autoapply: false
